<script>
// ════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════
const WEEK_FILES = [
  'data/week_01.json',
  'data/week_02.json',
  'data/week_03.json',
  'data/week_04.json',
  'data/week_05.json',
];

// Файлы WA — для подгрузки реальных данных в карточку
const WA_FILES = {
  5: 'data/whatsapp/wa_week_05.json',
};

const COMP_METRICS = [
  { path: 'meta.spend_aed',  label: 'Meta Spend',  goodDir: 'none', fmt: 'aed' },
  { path: 'meta.leads_form', label: 'Meta Leads',  goodDir: 'up',   fmt: 'num' },
  { path: 'meta.cpl_aed',    label: 'CPL AED',     goodDir: 'down', fmt: 'aed' },
  { path: 'smm.reach',       label: 'IG Reach',    goodDir: 'up',   fmt: 'k'   },
  { path: 'smm.link_clicks', label: 'IG Clicks',   goodDir: 'up',   fmt: 'num' },
];

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let weeks   = [];
let active  = 0;
let charts  = {};
let waCache = {};   // кэш загруженных WA JSON

// ════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════
(async function boot() {
  try {
    const results = await Promise.allSettled(
      WEEK_FILES.map(f => fetch(f).then(r => {
        if (!r.ok) throw new Error(r.status);
        return r.json();
      }))
    );
    weeks = results
      .map(r => r.status === 'fulfilled' ? r.value : null)
      .filter(Boolean);

    if (!weeks.length) throw new Error('No data files found');
    active = weeks.length - 1;

    // Предзагружаем WA данные для текущей недели
    await loadWAForWeek(active);

    updateBadges();
    render();
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      `<p style="color:#ef4444;padding:40px;text-align:center">
        ⚠️ Could not load data files.<br>
        <small style="color:#999">
          Make sure data/week_0X.json files exist.<br>${e.message}
        </small>
      </p>`;
  }
})();

// ════════════════════════════════════════════
//  LOAD WA DATA FOR WEEK
// ════════════════════════════════════════════
async function loadWAForWeek(idx) {
  const w = weeks[idx];
  if (!w) return;
  const weekNum = w.week_num;

  // Уже загружен
  if (waCache[weekNum] !== undefined) return;

  const file = WA_FILES[weekNum];
  if (!file) {
    waCache[weekNum] = null;
    return;
  }

  try {
    const resp = await fetch(file);
    if (!resp.ok) throw new Error('not found');
    const raw = await resp.json();
    waCache[weekNum] = computeWA(raw);
  } catch(e) {
    waCache[weekNum] = null;
  }
}

// ════════════════════════════════════════════
//  COMPUTE WA METRICS FROM RAW JSON
//  (та же логика что в whatsapp.html)
// ════════════════════════════════════════════
function computeWA(raw) {
  const { campaigns, crm_leads, brokers, pipeline_stages } = raw;
  if (!campaigns || !crm_leads) return null;

  const positiveStages = new Set(pipeline_stages?.positive || []);

  const T = {
    target:        campaigns.reduce((s,c) => s + (c.target||0), 0),
    meta_accepted: campaigns.reduce((s,c) => s + (c.meta_accepted||0), 0),
    delivered:     campaigns.reduce((s,c) => s + (c.delivered||0), 0),
    read:          campaigns.reduce((s,c) => s + (c.read||0), 0),
    failed:        campaigns.reduce((s,c) => s + (c.failed||0), 0),
    replies_wa:    campaigns.reduce((s,c) => s + (c.replies_wa||0), 0),
    campaigns_count: campaigns.length,
  };

  T.delivery_rate_pct     = T.target ? +((T.delivered / T.target) * 100).toFixed(1) : 0;
  T.reply_rate_of_read    = T.read   ? +((T.replies_wa / T.read) * 100).toFixed(1) : 0;
  T.failed_rate_pct       = T.target ? +((T.failed / T.target) * 100).toFixed(1) : 0;

  const crm_total    = crm_leads.length;
  const crm_positive = crm_leads.filter(l => positiveStages.has(l.stage) && !l.opt_out).length;
  const crm_opt_out  = crm_leads.filter(l => l.opt_out).length;
  const crm_in_comm  = crm_leads.filter(l => l.stage === 'In Communication' && !l.opt_out).length;

  return {
    ...T,
    crm_total,
    crm_positive,
    crm_opt_out,
    crm_in_communication: crm_in_comm,
    budget_usd: raw.meta?.budget_usd || null,
  };
}

// ════════════════════════════════════════════
//  BADGES
// ════════════════════════════════════════════
function updateBadges() {
  const w = weeks[active];
  if (!w) return;

  const spend = w.meta?.spend_aed;
  document.getElementById('badge-meta').textContent =
    spend ? spend.toLocaleString() : '—';

  const reach = w.smm?.reach;
  document.getElementById('badge-smm').textContent =
    reach ? (reach >= 1000 ? Math.round(reach/1000)+'k' : reach) : '—';

  // WA badge — реальные данные из wa_week_XX.json
  const waData = waCache[w.week_num];
  document.getElementById('badge-wa').textContent =
    waData ? waData.crm_in_communication : '—';

  // RED badge
  document.getElementById('badge-red').textContent =
    w.red_quiz_leads?.length || '—';
}

// ════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════
function get(obj, path) {
  return path.split('.').reduce((o, k) => (o != null ? o[k] : 0), obj) ?? 0;
}

function fmtVal(val, type) {
  if (val == null || val === 0) return '—';
  if (type === 'aed') return val.toLocaleString() + ' ₟';
  if (type === 'k')   return val >= 1000 ? (val/1000).toFixed(1)+'k' : val;
  return val.toLocaleString();
}

function delta(curr, prev, goodDir) {
  if (!prev || !curr) return '';
  const pct = Math.round(((curr - prev) / prev) * 100);
  const sign = pct >= 0 ? '+' : '';
  let cls = pct >= 0 ? 'delta-pos' : 'delta-neg';
  if (goodDir === 'down' && pct < 0) cls = 'delta-good-neg';
  if (goodDir === 'down' && pct > 0) cls = 'delta-neg';
  return `<span class="comp-delta ${cls}">${sign}${pct}%</span>`;
}

function trendHtml(curr, prev, goodDir) {
  if (prev == null || curr == null || prev === 0) return '';
  const pct = Math.round(((curr - prev) / prev) * 100);
  const sign = pct >= 0 ? '↑' : '↓';
  let cls = 'trend-up';
  if (pct < 0 && goodDir !== 'down') cls = 'trend-down';
  if (pct < 0 && goodDir === 'down') cls = 'trend-good-down';
  if (pct > 0 && goodDir === 'down') cls = 'trend-down';
  return `<div class="kpi-trend ${cls}">${sign} ${Math.abs(pct)}% vs prev week</div>`;
}

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  charts = {};
}

function mkChart(id, config) {
  const el = document.getElementById(id);
  if (!el) return;
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(el, config);
}

const WEEK_LABELS = () => weeks.map(w => w.week_label);

// ════════════════════════════════════════════
//  RENDER MASTER
// ════════════════════════════════════════════
function render() {
  renderTabs();
  renderCompStrip();
  renderDashboard();
}

async function switchWeek(idx) {
  active = idx;
  destroyCharts();
  await loadWAForWeek(idx);
  updateBadges();
  render();
}

// ════════════════════════════════════════════
//  TABS
// ════════════════════════════════════════════
function renderTabs() {
  document.getElementById('hPeriod').textContent = weeks[active].period;
  document.getElementById('tabsWrap').innerHTML = weeks.map((w, i) => `
    <div class="tab ${i === active ? 'active' : ''}" onclick="switchWeek(${i})">
      <div class="tab-label">
        ${w.week_label}
        ${w.is_partial ? '<span class="partial-note">Partial</span>' : ''}
      </div>
      <div class="tab-dates">${w.period}</div>
    </div>
  `).join('');
}

// ════════════════════════════════════════════
//  COMPARISON STRIP
// ════════════════════════════════════════════
function renderCompStrip() {
  const BAR_MAX_H = 32;

  const html = COMP_METRICS.map(m => {
    const vals = weeks.map(wk => get(wk, m.path));
    const maxV = Math.max(...vals.filter(v => v > 0), 1);
    const curr = vals[active];
    const prev = active > 0 ? vals[active - 1] : null;

    const barsHtml = vals.map((v, i) => {
      const h = v > 0 ? Math.max(4, Math.round((v / maxV) * BAR_MAX_H)) : 4;
      const isCurr = i === active;
      return `
        <div class="comp-bar-wrap">
          <div class="comp-bar-val ${isCurr ? 'current' : ''}">
            ${fmtVal(v, m.fmt)}
          </div>
          <div class="comp-bar-bg ${isCurr ? 'current' : ''}"
               style="height:${h}px"></div>
          <div class="comp-bar-wk ${isCurr ? 'current' : ''}">
            ${weeks[i].week_label}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="comp-metric">
        <div class="comp-metric-label">${m.label}</div>
        <div class="comp-bars">${barsHtml}</div>
        ${delta(curr, prev, m.goodDir)}
      </div>`;
  }).join('');

  document.getElementById('compStrip').innerHTML = html;
}

// ════════════════════════════════════════════
//  DASHBOARD
// ════════════════════════════════════════════
function renderDashboard() {
  const w    = weeks[active];
  const prev = active > 0 ? weeks[active - 1] : null;

  document.getElementById('mainContent').innerHTML = `
    ${renderChannelSummary(w, prev)}
    ${renderTrendChart()}
    ${renderInsights(w)}
  `;

  requestAnimationFrame(() => {
    drawWeeklyTrend();
  });
}

// ════════════════════════════════════════════
//  CHANNEL SUMMARY CARDS
//  WhatsApp — данные из wa_week_XX.json
// ════════════════════════════════════════════

    ? Math.round((metaCpl - p.meta.cpl_aed) / p.meta.cpl_aed * 100) : null;
  const metaDeltaHtml = metaDelta !== null
    ? `<span style="font-size:10px;color:${metaDelta < 0 ? '#22c55e' : '#ef4444'}">
        ${metaDelta > 0 ? '↑' : '↓'} CPL ${Math.abs(metaDelta)}%
       </span>` : '';

  // ── SMM ──
  const smmReach  = w.smm?.reach;
  const smmDelta  = p?.smm?.reach
    ? Math.round((smmReach - p.smm.reach) / p.smm.reach * 100) : null;

    ? `<span style="font-size:10px;color:${smmDelta > 0 ? '#22c55e' : '#ef4444'}">

      <div class="channel-stat-item">
        <div class="channel-stat-val">${waData.target.toLocaleString()}</div>
        <div class="channel-stat-label">Target</div>

      </div>
      <div class="channel-stat-item">

        <div class="channel-stat-label">WA Replies</div>
      </div>
      <div class="channel-stat-item">
        <div class="channel-stat-val">${waData.crm_total}</div>
        <div class="channel-stat-label">CRM Leads</div>

    </div>
    <div style="margin-top:10px;display:flex;gap:12px;flex-wrap:wrap;">
      <span style="font-size:10px;color:#AAA">
        📦 ${waData.delivery_rate_pct}% delivery

      </span>
      <span style="font-size:10px;color:#AAA">
        ${waData.campaigns_count} campaigns
        ${waData.budget_usd ? '· $' + waData.budget_usd : ''}

    </div>
  ` : `
    <div class="channel-stats">
      <div class="channel-stat-item">
        <div class="channel-stat-val">—</div>
        <div class="channel-stat-label">No launch</div>
      </div>
    </div>
    <div style="margin-top:10px;font-size:10px;color:#AAA">
      No WhatsApp campaign this week

  // ── RED ──
  const redCount = w.red_quiz_leads?.length || 0;
  const redQual  = w.red_quiz_leads?.filter(l => l.status === 'Qualified').length || 0;

  return `
    <div class="sec-head">

            <span class="channel-icon">◈</span>

        <div class="channel-stats">
          <div class="channel-stat-item">
            <div class="channel-stat-val">
              ${w.meta?.spend_aed ? w.meta.spend_aed.toLocaleString()+'₟' : '—'}
            </div>
            <div class="channel-stat-label">Spend</div>
          </div>
          <div class="channel-stat-item">
            <div class="channel-stat-val">${w.meta?.leads_form || '—'}</div>
            <div class="channel-stat-label">Leads</div>
          </div>
          <div class="channel-stat-item">
            <div class="channel-stat-val">

// ════════════════════════════════════════════
//  TREND CHARTS
// ════════════════════════════════════════════
function renderTrendChart() {
  return `
    <div class="sec-head" style="margin-top:28px">
      <div class="sec-icon">📈</div>
      <div class="sec-title">Weekly Trend — All Weeks</div>
    </div>
    <div class="chart-grid-2">
      <div class="chart-card">
        <h3>Meta Spend vs CPL — weekly</h3>
        <div class="chart-wrap" style="height:200px">
          <canvas id="chartWeeklyMeta"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <h3>Instagram Reach & Link Clicks — weekly</h3>
        <div class="chart-wrap" style="height:200px">
          <canvas id="chartWeeklySmm"></canvas>
        </div>
      </div>
    </div>`;
}

function drawWeeklyTrend() {
  const labels = WEEK_LABELS();
  const baseFont = { size: 10 };

  // Chart 1 — Meta spend vs CPL
  mkChart('chartWeeklyMeta', {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
