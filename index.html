<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaia Marketing Reports</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; }
.header { background: #1e293b; padding: 24px 32px; border-bottom: 1px solid #334155; }
.header h1 { font-size: 24px; color: #f1f5f9; }
.header p { color: #94a3b8; margin-top: 4px; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; padding: 24px 32px; }
.kpi-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
.kpi-card .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
.kpi-card .value { font-size: 32px; font-weight: 700; margin-top: 8px; }
.kpi-card .sub { font-size: 12px; color: #64748b; margin-top: 4px; }
.green { color: #4ade80; }
.yellow { color: #fbbf24; }
.red { color: #f87171; }
.blue { color: #60a5fa; }
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 32px 24px; }
.chart-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
.chart-card h3 { font-size: 14px; color: #94a3b8; margin-bottom: 16px; }
.chart-full { padding: 0 32px 24px; }
.chart-full .chart-card { }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #0f172a; padding: 10px 12px; text-align: left; color: #64748b; font-weight: 500; border-bottom: 1px solid #334155; }
td { padding: 10px 12px; border-bottom: 1px solid #1e293b; }
tr:hover td { background: #1e293b; }
.badge { padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
.badge-green { background: #14532d; color: #4ade80; }
.badge-yellow { background: #451a03; color: #fbbf24; }
.badge-red { background: #450a0a; color: #f87171; }
.table-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; margin: 0 32px 32px; }
.table-card h3 { font-size: 14px; color: #94a3b8; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 Gaia Marketing Reports</h1>
  <p>WhatsApp Campaigns Analytics</p>
</div>

<div class="kpi-grid" id="kpiGrid"></div>

<div class="charts-grid">
  <div class="chart-card">
    <h3>SENT vs DELIVERED</h3>
    <canvas id="chartDelivery"></canvas>
  </div>
  <div class="chart-card">
    <h3>OPEN RATE BY CAMPAIGN</h3>
    <canvas id="chartOpen"></canvas>
  </div>
</div>

<div class="chart-full">
  <div class="chart-card">
    <h3>CLICKS BY CAMPAIGN</h3>
    <canvas id="chartClicks"></canvas>
  </div>
</div>

<div class="table-card">
  <h3>ALL CAMPAIGNS</h3>
  <table id="campaignTable">
    <thead>
      <tr>
        <th>Campaign</th>
        <th>Date</th>
        <th>Sent</th>
        <th>Delivered</th>
        <th>Opened</th>
        <th>Clicked</th>
        <th>Open Rate</th>
        <th>CTR</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
