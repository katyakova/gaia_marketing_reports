  GAIA Real Estate &nbsp;·&nbsp; Marketing Dashboard &nbsp;·&nbsp;
  Week runs Fri → Wed &nbsp;·&nbsp; Report day: Thursday
</footer>

<script>
// ════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════
const WEEK_FILES = [
  'data/week_01.json',
  'data/week_02.json',
  'data/week_03.json',
  'data/week_04.json',
  'data/week_05.json'
];

const COMP_METRICS = [
  { path: 'leads.total',            label: 'Total Leads', goodDir: 'up',   fmt: 'num' },
  { path: 'leads.in_communication', label: 'In Comm',     goodDir: 'up',   fmt: 'num' },
  { path: 'leads.qualified',        label: 'Qualified',   goodDir: 'up',   fmt: 'num' },
  { path: 'meta.spend_aed',         label: 'Meta Spend',  goodDir: 'none', fmt: 'aed' },
  { path: 'meta.leads_form',        label: 'Meta Leads',  goodDir: 'up',   fmt: 'num' },
  { path: 'meta.cpl_aed',           label: 'CPL AED',     goodDir: 'down', fmt: 'aed' },
  { path: 'smm.reach',              label: 'IG Reach',    goodDir: 'up',   fmt: 'k'   },
  { path: 'smm.link_clicks',        label: 'IG Clicks',   goodDir: 'up',   fmt: 'num' },
];

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let weeks  = [];
let active = 0;
let charts = {};

// ════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════
(async function boot() {
  try {
    const results = await Promise.allSettled(
      WEEK_FILES.map(f => fetch(f).then(r => {
        if (!r.ok) throw new Error(r.status);
        return r.json();
      }))
    );
    weeks = results
      .map(r => r.status === 'fulfilled' ? r.value : null)
      .filter(Boolean);

    if (!weeks.length) throw new Error('No data files found');
    active = weeks.length - 1;
    updateBadges();
    render();
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      `<p style="color:#ef4444;padding:40px;text-align:center">
        ⚠️ Could not load data files.<br>
        <small style="color:#999">
          Make sure data/week_0X.json files exist.<br>${e.message}
        </small>
      </p>`;
  }
})();

// ════════════════════════════════════════════
//  BADGES
// ════════════════════════════════════════════
function updateBadges() {
  const w = weeks[active];
  if (!w) return;

  const spend = w.meta?.spend_aed;
  document.getElementById('badge-meta').textContent =
    spend ? spend.toLocaleString() : '—';

  const reach = w.smm?.reach;
  document.getElementById('badge-smm').textContent =
    reach ? (reach >= 1000 ? Math.round(reach/1000)+'k' : reach) : '—';

  document.getElementById('badge-leads').textContent =
    w.leads?.total || '—';

  document.getElementById('badge-wa').textContent =
    w.whatsapp_outreach?.in_communication || '—';

  document.getElementById('badge-red').textContent =
    w.red_quiz_leads?.length || '—';
}

// ════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════
function get(obj, path) {
  return path.split('.').reduce((o, k) => (o != null ? o[k] : 0), obj) ?? 0;
}

function fmtVal(val, type) {
  if (val == null || val === 0) return '—';
  if (type === 'aed') return val.toLocaleString() + ' ₟';
  if (type === 'k')   return val >= 1000 ? (val/1000).toFixed(1)+'k' : val;
  return val.toLocaleString();
}

function delta(curr, prev, goodDir) {
  if (!prev || !curr) return '';
  const pct = Math.round(((curr - prev) / prev) * 100);
  const sign = pct >= 0 ? '+' : '';
  let cls = pct >= 0 ? 'delta-pos' : 'delta-neg';
  if (goodDir === 'down' && pct < 0) cls = 'delta-good-neg';
  if (goodDir === 'down' && pct > 0) cls = 'delta-neg';
  return `<span class="comp-delta ${cls}">${sign}${pct}%</span>`;
}

function trendHtml(curr, prev, goodDir) {
  if (!prev || !curr) return '';
  const pct = Math.round(((curr - prev) / prev) * 100);
  const sign = pct >= 0 ? '↑' : '↓';
  let cls = 'trend-up';
  if (pct < 0 && goodDir !== 'down') cls = 'trend-down';
  if (pct < 0 && goodDir === 'down') cls = 'trend-good-down';
  if (pct > 0 && goodDir === 'down') cls = 'trend-down';
  return `<div class="kpi-trend ${cls}">${sign} ${Math.abs(pct)}% vs prev week</div>`;
}

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  charts = {};
}

function mkChart(id, config) {
  const el = document.getElementById(id);
  if (!el) return;
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(el, config);
}

const WEEK_LABELS = () => weeks.map(w => w.week_label);

// ════════════════════════════════════════════
//  RENDER MASTER
// ════════════════════════════════════════════
function render() {
  renderTabs();
  renderCompStrip();
  renderDashboard();
}

function switchWeek(idx) {
  active = idx;
  destroyCharts();
  updateBadges();
  render();
}

// ════════════════════════════════════════════
//  TABS
// ════════════════════════════════════════════
function renderTabs() {
  document.getElementById('hPeriod').textContent = weeks[active].period;
  document.getElementById('tabsWrap').innerHTML = weeks.map((w, i) => `
    <div class="tab ${i === active ? 'active' : ''}" onclick="switchWeek(${i})">
      <div class="tab-label">
        ${w.week_label}
        ${w.is_partial ? '<span class="partial-note">Partial</span>' : ''}
      </div>
      <div class="tab-dates">${w.period}</div>
    </div>
  `).join('');
}

// ════════════════════════════════════════════
//  COMPARISON STRIP
// ════════════════════════════════════════════
function renderCompStrip() {
  const BAR_MAX_H = 32;

  const html = COMP_METRICS.map(m => {
    const vals = weeks.map(wk => get(wk, m.path));
    const maxV = Math.max(...vals.filter(v => v > 0), 1);
    const curr = vals[active];
    const prev = active > 0 ? vals[active - 1] : null;

    const barsHtml = vals.map((v, i) => {
      const h = v > 0 ? Math.max(4, Math.round((v / maxV) * BAR_MAX_H)) : 4;
      const isCurr = i === active;
      return `
        <div class="comp-bar-wrap">
          <div class="comp-bar-val ${isCurr ? 'current' : ''}">
            ${fmtVal(v, m.fmt)}
          </div>
          <div class="comp-bar-bg ${isCurr ? 'current' : ''}"
               style="height:${h}px"></div>
          <div class="comp-bar-wk ${isCurr ? 'current' : ''}">
            ${weeks[i].week_label}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="comp-metric">
        <div class="comp-metric-label">${m.label}</div>
        <div class="comp-bars">${barsHtml}</div>
        ${delta(curr, prev, m.goodDir)}
      </div>`;
  }).join('');

  document.getElementById('compStrip').innerHTML = html;
}

// ════════════════════════════════════════════
//  DASHBOARD — SUMMARY ONLY
// ════════════════════════════════════════════
function renderDashboard() {
  const w    = weeks[active];
  const prev = active > 0 ? weeks[active - 1] : null;

  document.getElementById('mainContent').innerHTML = `
    ${renderOverviewKPIs(w, prev)}
    ${renderChannelSummary(w, prev)}
    ${renderTrendChart()}
    ${renderInsights(w)}
  `;

  requestAnimationFrame(() => {
    drawWeeklyTrend();
  });
}

// ════════════════════════════════════════════
//  OVERVIEW KPIs
// ════════════════════════════════════════════
function renderOverviewKPIs(w, prev) {
  const p = prev;
  const kpis = [
    {
      label: 'Total Leads',       color: 'k-black',
      value: w.leads.total,
      sub: `W${w.week_num} · ${w.period}`,
      trend: trendHtml(w.leads.total, p?.leads?.total, 'up')
    },
    {
      label: 'In Communication',  color: 'k-green',
      value: w.leads.in_communication,
      sub: `${w.leads.total
        ? Math.round(w.leads.in_communication / w.leads.total * 100) : 0}% of total`,
      trend: trendHtml(w.leads.in_communication, p?.leads?.in_communication, 'up')
    },
    {
      label: 'Qualified',         color: 'k-blue',
      value: w.leads.qualified,
      sub: 'Hot leads this week',
      trend: trendHtml(w.leads.qualified, p?.leads?.qualified, 'up')
    },
    {
      label: 'Follow-Up',         color: 'k-purple',
      value: w.leads.follow_up,
      sub: 'Active pipeline',
      trend: trendHtml(w.leads.follow_up, p?.leads?.follow_up, 'up')
    },
    {
      label: 'Prospect Lost',     color: 'k-red',
      value: w.leads.prospect_lost,
      sub: `${w.leads.total
        ? Math.round(w.leads.prospect_lost / w.leads.total * 100) : 0}% loss rate`,
      trend: trendHtml(w.leads.prospect_lost, p?.leads?.prospect_lost, 'down')
    },
    {
      label: 'Junk / Invalid',    color: 'k-amber',
      value: w.leads.junk,
      sub: 'Filtered out',
      trend: trendHtml(w.leads.junk, p?.leads?.junk, 'down')
    },
  ];

  return `
    <div class="sec-head">
      <div class="sec-icon">📊</div>
      <div class="sec-title">Weekly Overview — All Channels Combined</div>
    </div>
    <div class="kpi-grid">
      ${kpis.map(k => `
        <div class="kpi ${k.color}">
          <div class="kpi-label">${k.label}</div>
          <div class="kpi-value">${k.value ?? '—'}</div>
          <div class="kpi-sub">${k.sub}</div>
          ${k.trend}
        </div>`).join('')}
    </div>`;
}

// ════════════════════════════════════════════
//  CHANNEL SUMMARY CARDS
// ════════════════════════════════════════════
function renderChannelSummary(w, prev) {
  const p = prev;

  // META
  const metaCpl   = w.meta?.cpl_aed;
  const metaDelta = p?.meta?.cpl_aed
    ? Math.round((metaCpl - p.meta.cpl_aed) / p.meta.cpl_aed * 100) : null;
  const metaDeltaHtml = metaDelta !== null
    ? `<span style="font-size:10px;color:${metaDelta < 0 ? '#22c55e' : '#ef4444'}">
        ${metaDelta > 0 ? '↑' : '↓'} CPL ${Math.abs(metaDelta)}%
       </span>` : '';

  // SMM
  const smmReach   = w.smm?.reach;
  const smmDelta = p?.smm?.reach
    ? Math.round((smmReach - p.smm.reach) / p.smm.reach * 100) : null;
  const smmDeltaHtml = smmDelta !== null
    ? `<span style="font-size:10px;color:${smmDelta > 0 ? '#22c55e' : '#ef4444'}">
        ${smmDelta > 0 ? '↑' : '↓'} ${Math.abs(smmDelta)}% reach
       </span>` : '';

  // LEADS source breakdown short
  const src = w.leads?.by_source || {};
  const topSrc = Object.entries(src)
    .filter(([,v]) => v > 0)
    .sort((a,b) => b[1] - a[1])
    .slice(0, 2)
    .map(([k, v]) => `${k.replace(/_/g,' ')}: ${v}`)
    .join(' · ');

  // WA
  const waReply = w.whatsapp_outreach?.contacts_sent
    ? Math.round(w.whatsapp_outreach.replied
        / w.whatsapp_outreach.contacts_sent * 100) : 0;

  // RED
  const redCount = w.red_quiz_leads?.length || 0;
  const redQual  = w.red_quiz_leads?.filter(l =>
    l.status === 'Qualified').length || 0;

  return `
    <div class="sec-head" style="margin-top:28px">
      <div class="sec-icon">📡</div>
      <div class="sec-title">Channels at a Glance — click to explore</div>
    </div>
    <div class="channel-grid">

      <!-- META ADS -->
      <a href="meta.html" class="channel-card c-meta">
        <div class="channel-header">
          <div class="channel-icon-wrap">
            <span class="channel-icon">💰</span>
            <span class="channel-name">Meta Ads</span>
          </div>
          <span class="channel-arrow">→</span>
        </div>
        <div class="channel-stats">
          <div class="channel-stat-item">
            <div class="channel-stat-val">
              ${w.meta?.spend_aed
                ? w.meta.spend_aed.toLocaleString() + '₟' : '—'}
            </div>
            <div class="channel-stat-label">Spend</div>
          </div>
          <div class="channel-stat-item">
            <div class="channel-stat-val">${w.meta?.leads_form || '—'}</div>
            <div class="channel-stat-label">Leads</div>
          </div>
          <div class="channel-stat-item">
            <div class="channel-stat-val">
              ${w.meta?.cpl_aed ? w.meta.cpl_aed + '₟' : '—'}
            </div>
            <div class="channel-stat-label">CPL</div>
          </div>
          <div class="channel-stat-item">
            <div class="channel-stat-val">
              ${w.meta?.impressions
                ? Math.round(w.meta.impressions/1000)+'k' : '—'}
            </div>
            <div class="channel-stat-label">Impressions</div>
          </div>
        </div>
        <div style="margin-top:10px">${metaDeltaHtml}</div>
      </a>

      <!-- SMM -->
      <a href="smm.html" class="channel-card c-smm">
        <div class="channel-header">
          <div class="channel-icon-wrap">
            <span class="channel-icon">📸</span>
            <span class="channel-name">Instagram</span>
          </div>
          <span class="channel-arrow">→</span>
        </div>
        <div class="channel-stats">
          <div class="channel-stat-item">
            <div class="channel-stat-val">
              ${w.smm?.reach >= 1000
                ? Math.round(w.smm.reach/1000)+'k' : w.smm?.reach || '—'}
            </div>
            <div class="channel-stat-label">Reach</div>
          </div>
          <div class="channel-stat-item">
            <div class="channel-stat-val">
              ${w.smm?.views >= 1000
                ? Math.round(w.smm.views/1000)+'k' : w.smm?.views || '—'}
            </div>
            <div class="channel-stat-label">Views</div>
          </div>
          <div class="channel-stat-item">
            <div class="channel-stat-val">${w.smm?.link_clicks || '—'}</div>
            <div class="channel-stat-label">Link Clicks</div>
          </div>
          <div class="channel-stat-item">
            <div class="channel-stat-val">${w.smm?.follows || '—'}</div>
            <div class="channel-stat-label">New Followers</div>
          </div>
        </div>
        <div style="margin-top:10px">${smmDeltaHtml}</div>
      </a>

      <!-- LEADS -->
      <a href="leads.html" class="channel-card c-leads">
        <div class="channel-header">
          <div class="channel-icon-wrap">
            <span class="channel-icon">🎯</span>
            <span class="channel-name">Leads</span>
          </div>
          <span class="channel-arrow">→</span>
        </div>
        <div class="channel-stats">
          <div class="channel-stat-item">
            <div class="channel-stat-val">${w.leads?.total || '—'}</div>
            <div class="channel-stat-label">Total</div>
          </div>
          <div class="channel-stat-item">
            <div class="channel-stat-val">${w.leads?.qualified || '—'}</div>
            <div class="channel-stat-label">Qualified</div>
          </div>
          <div class="channel-stat-item">
            <div class="channel-stat-val">${w.leads?.in_communication || '—'}</div>
            <div class="channel-stat-label">In Comm</div>
          </div>
          <div class="channel-stat-item">
            <div class="channel-stat-val">${w.leads?.follow_up || '—'}</div>
            <div class="channel-stat-label">Follow-Up</div>
          </div>
        </div>
        <div style="margin-top:10px;font-size:10px;color:#AAA">${topSrc}</div>
      </a>

      <!-- WHATSAPP -->
      <a href="whatsapp.html" class="channel-card c-wa">
        <div class="channel-header">
          <div class="channel-icon-wrap">
            <span class="channel-icon">💬</span>
            <span class="channel-name">WhatsApp</span>
          </div>
          <span class="channel-arrow">→</span>
        </div>
        <div class="channel-stats">
          <div class="channel-stat-item">
            <div class="channel-stat-val">
              ${w.whatsapp_outreach?.contacts_sent || '—'}
            </div>
            <div class="channel-stat-label">Sent</div>
          </div>
          <div class="channel-stat-item">
            <div class="channel-stat-val">
              ${w.whatsapp_outreach?.replied || '—'}
            </div>
            <div class="channel-stat-label">Replied</div>
          </div>
          <div class="channel-stat-item">
            <div class="channel-stat-val">
              ${w.whatsapp_outreach?.in_communication || '—'}
            </div>
            <div class="channel-stat-label">In Comm</div>
          </div>
          <div class="channel-stat-item">
            <div class="channel-stat-val">${waReply}%</div>
            <div class="channel-stat-label">Reply Rate</div>
          </div>
        </div>
        <div style="margin-top:10px;font-size:10px;color:#AAA">
          ${w.whatsapp_outreach?.campaigns?.length || 0} campaigns active
        </div>
      </a>

      <!-- RED QUIZ -->
      <a href="red.html" class="channel-card c-red">
        <div class="channel-header">
          <div class="channel-icon-wrap">
            <span class="channel-icon">🔴</span>
            <span class="channel-name">RED Quiz</span>
          </div>
          <span class="channel-arrow">→</span>
        </div>
        <div class="channel-stats">
          <div class="channel-stat-item">
            <div class="channel-stat-val">${redCount}</div>
            <div class="channel-stat-label">Total Leads</div>
          </div>
          <div class="channel-stat-item">
            <div class="channel-stat-val">${redQual}</div>
            <div class="channel-stat-label">Qualified</div>
          </div>
          <div class="channel-stat-item">
            <div class="channel-stat-val">
              ${w.red_quiz_leads
                ? [...new Set(w.red_quiz_leads.map(l => l.country))].length
                : '—'}
            </div>
            <div class="channel-stat-label">Countries</div>
          </div>
          <div class="channel-stat-item">
            <div class="channel-stat-val">
              ${w.red_quiz_leads
                ? w.red_quiz_leads.filter(l =>
                    l.purpose === 'invest').length : '—'}
            </div>
            <div class="channel-stat-label">Investors</div>
          </div>
        </div>
        <div style="margin-top:10px;font-size:10px;color:#AAA">
          John Richmond Residences · 240k+ AED
        </div>
      </a>

    </div>`;
}

// ════════════════════════════════════════════
//  TREND CHART (summary)
// ════════════════════════════════════════════
function renderTrendChart() {
  return `
    <div class="sec-head" style="margin-top:28px">
      <div class="sec-icon">📈</div>
      <div class="sec-title">Weekly Trend — All Weeks</div>
    </div>
    <div class="chart-grid-2">
      <div class="chart-card">
        <h3>Total Leads & Qualified — weekly</h3>
        <div class="chart-wrap" style="height:200px">
          <canvas id="chartWeeklyLeads"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <h3>Meta Spend vs CPL — weekly</h3>
        <div class="chart-wrap" style="height:200px">
          <canvas id="chartWeeklyMeta"></canvas>
        </div>
      </div>
    </div>`;
}

function drawWeeklyTrend() {
  const labels = WEEK_LABELS();
  const DEFAULTS = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: true, labels: { font: { size: 10 }, boxWidth: 10 } } },
    scales: {
      x: { grid: { display: false }, ticks: { font: { size: 10 } } },
      y: { grid: { color: '#F0EFED' }, ticks: { font: { size: 10 } } }
    }
  };

  // Chart 1 — Leads trend
  mkChart('chartWeeklyLeads', {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Total Leads',
          data: weeks.map(w => w.leads?.total || 0),
          backgroundColor: weeks.map((w, i) =>
            i === active ? '#1A1A1A' : '#E4E2DF'),
          borderRadius: 4,
        },
        {
          label: 'In Communication',
          data: weeks.map(w => w.leads?.in_communication || 0),
          backgroundColor: weeks.map((w, i) =>
            i === active ? '#f59e0b' : 'rgba(245,158,11,0.3)'),
          borderRadius: 4,
        },
        {
          label: 'Qualified',
          data: weeks.map(w => w.leads?.qualified || 0),
          backgroundColor: weeks.map((w, i) =>
            i === active ? '#22c55e' : 'rgba(34,197,94,0.3)'),
          borderRadius: 4,
        }
      ]
    },
    options: DEFAULTS
  });

  // Chart 2 — Meta spend vs CPL
  mkChart('chartWeeklyMeta', {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Spend AED',
                   data: weeks.map(w => w.meta?.spend_aed || 0),
          backgroundColor: weeks.map((w, i) =>
            i === active ? '#3b82f6' : '#DBEAFE'),
          borderRadius: 4,
          yAxisID: 'y',
        },
        {
          label: 'CPL AED',
          data: weeks.map(w => w.meta?.cpl_aed || null),
          type: 'line',
          borderColor: '#f59e0b',
          backgroundColor: 'transparent',
          pointBackgroundColor: weeks.map((w, i) =>
            i === active ? '#f59e0b' : '#FCD34D'),
          pointRadius: weeks.map((w, i) => i === active ? 6 : 4),
          tension: 0.3,
          spanGaps: true,
          yAxisID: 'y2',
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true,
          labels: { font: { size: 10 }, boxWidth: 10 }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 } } },
        y: {
          grid: { color: '#F0EFED' },
          ticks: { font: { size: 10 } },
          position: 'left',
        },
        y2: {
          grid: { display: false },
          ticks: {
            font: { size: 10 },
            callback: v => v + ' ₟'
          },
          position: 'right',
        }
      }
    }
  });
}

// ════════════════════════════════════════════
//  INSIGHTS
// ════════════════════════════════════════════
function renderInsights(w) {
  const ins = w.insights || {};
  const items = [
    { key: 'general', label: 'General',   cls: '',        icon: '💡' },
    { key: 'meta',    label: 'Meta Ads',  cls: 'i-meta',  icon: '💰' },
    { key: 'smm',     label: 'Instagram', cls: 'i-smm',   icon: '📸' },
    { key: 'leads',   label: 'Leads',     cls: 'i-leads', icon: '🎯' },
  ].filter(i => ins[i.key]);

  if (!items.length) return '';

  return `
    <div class="sec-head" style="margin-top:28px">
      <div class="sec-icon">💡</div>
      <div class="sec-title">Weekly Insights</div>
    </div>
    <div class="insights-grid">
      ${items.map(i => `
        <div class="insight ${i.cls}">
          <div class="insight-tag">${i.icon} ${i.label}</div>
          <div class="insight-text">${ins[i.key]}</div>
        </div>`).join('')}
    </div>`;
}
