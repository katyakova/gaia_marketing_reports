<script>
// ════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════
const WEEK_FILES = [
  'data/week_01.json',
  'data/week_02.json',
  'data/week_03.json',
  'data/week_04.json',
  'data/week_05.json',
];

const WA_FILES = {
  5: 'data/whatsapp/wa_week_05.json',
};

const COMP_METRICS = [
  { path: 'meta.spend_aed',  label: 'Meta Spend',  goodDir: 'none', fmt: 'aed' },
  { path: 'meta.leads_form', label: 'Meta Leads',  goodDir: 'up',   fmt: 'num' },
  { path: 'meta.cpl_aed',    label: 'CPL AED',     goodDir: 'down', fmt: 'aed' },
  { path: 'smm.reach',       label: 'IG Reach',    goodDir: 'up',   fmt: 'k'   },
  { path: 'smm.link_clicks', label: 'IG Clicks',   goodDir: 'up',   fmt: 'num' },
  { path: 'leads.total',     label: 'CRM Total',   goodDir: 'up',   fmt: 'num' },
];

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let weeks   = [];
let active  = 0;
let charts  = {};
let waCache = {};

// ════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════
(async function boot() {
  try {
    const results = await Promise.allSettled(
      WEEK_FILES.map(f => fetch(f).then(r => {
        if (!r.ok) throw new Error(r.status);
        return r.json();
      }))
    );
    weeks = results
      .map(r => r.status === 'fulfilled' ? r.value : null)
      .filter(Boolean);

    if (!weeks.length) throw new Error('No data files found');
    active = weeks.length - 1;

    await loadWAForWeek(active);
    updateBadges();
    render();
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      `<p style="color:#ef4444;padding:40px;text-align:center">
        ⚠️ Could not load data files.<br>
        <small style="color:#999">${e.message}</small>
      </p>`;
  }
})();

// ════════════════════════════════════════════
//  LOAD WA JSON
// ════════════════════════════════════════════
async function loadWAForWeek(idx) {
  const w = weeks[idx];
  if (!w) return;
  const wn = w.week_num;
  if (waCache[wn] !== undefined) return;
  const file = WA_FILES[wn];
  if (!file) { waCache[wn] = null; return; }
  try {
    const resp = await fetch(file);
    if (!resp.ok) throw new Error('not found');
    waCache[wn] = computeWA(await resp.json());
  } catch(e) {
    waCache[wn] = null;
  }
}

// ════════════════════════════════════════════
//  COMPUTE WA METRICS
// ════════════════════════════════════════════
function computeWA(raw) {
  const { campaigns, crm_leads, pipeline_stages } = raw;
  if (!campaigns || !crm_leads) return null;

  const positiveStages = new Set(pipeline_stages?.positive || []);

  const T = {
    target:          campaigns.reduce((s,c) => s + (c.target||0), 0),
    meta_accepted:   campaigns.reduce((s,c) => s + (c.meta_accepted||0), 0),
    delivered:       campaigns.reduce((s,c) => s + (c.delivered||0), 0),
    read:            campaigns.reduce((s,c) => s + (c.read||0), 0),
    failed:          campaigns.reduce((s,c) => s + (c.failed||0), 0),
    replies_wa:      campaigns.reduce((s,c) => s + (c.replies_wa||0), 0),
    campaigns_count: campaigns.length,
  };

  T.delivery_rate_pct  = T.target ? +((T.delivered / T.target) * 100).toFixed(1) : 0;
  T.reply_rate_of_read = T.read   ? +((T.replies_wa / T.read)   * 100).toFixed(1) : 0;
  T.failed_rate_pct    = T.target ? +((T.failed    / T.target)  * 100).toFixed(1) : 0;

  const crm_total    = crm_leads.length;
  const crm_positive = crm_leads.filter(l => positiveStages.has(l.stage) && !l.opt_out).length;
  const crm_opt_out  = crm_leads.filter(l => l.opt_out).length;
  const crm_in_comm  = crm_leads.filter(l => l.stage === 'In Communication' && !l.opt_out).length;
  const crm_qual     = crm_leads.filter(l => l.stage === 'Qualified' && !l.opt_out).length;

  return {
    ...T,
    crm_total,
    crm_positive,
    crm_opt_out,
    crm_in_communication: crm_in_comm,
    crm_qualified: crm_qual,
    budget_usd: raw.meta?.budget_usd || null,
  };
}

// ════════════════════════════════════════════
//  BADGES
// ════════════════════════════════════════════
function updateBadges() {
  const w = weeks[active];
  if (!w) return;

  document.getElementById('badge-meta').textContent =
    w.meta?.spend_aed ? w.meta.spend_aed.toLocaleString() : '—';

  const reach = w.smm?.reach;
  document.getElementById('badge-smm').textContent =
    reach ? (reach >= 1000 ? Math.round(reach/1000)+'k' : reach) : '—';

  const waData = waCache[w.week_num];
  document.getElementById('badge-wa').textContent =
    waData ? waData.crm_in_communication : (w.whatsapp_outreach?.in_communication || '—');

  document.getElementById('badge-red').textContent =
    w.red_quiz_leads?.length || '—';
}

// ════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════
function get(obj, path) {
  return path.split('.').reduce((o,k) => o != null ? o[k] : 0, obj) ?? 0;
}

function fmtNum(v) {
  if (v == null || v === 0 || v === '') return '—';
  return Number(v).toLocaleString();
}

function fmtAed(v) {
  if (!v) return '—';
  return v.toLocaleString() + ' ₟';
}

function fmtVal(val, type) {
  if (val == null || val === 0) return '—';
  if (type === 'aed') return val.toLocaleString() + ' ₟';
  if (type === 'k')   return val >= 1000 ? (val/1000).toFixed(1)+'k' : val;
  return val.toLocaleString();
}

function pct(a, b) {
  if (!b || !a) return null;
  return Math.round(a / b * 100);
}

function deltaPct(curr, prev) {
  if (!prev || !curr) return null;
  return Math.round((curr - prev) / prev * 100);
}

function trendHtml(curr, prev, goodDir) {
  if (prev == null || curr == null || prev === 0) return '';
  const p = Math.round(((curr - prev) / prev) * 100);
  const sign = p >= 0 ? '↑' : '↓';
  let cls = p >= 0 ? 'trend-up' : 'trend-down';
  if (goodDir === 'down') cls = p < 0 ? 'trend-good-down' : 'trend-down';
  return `<div class="kpi-trend ${cls}">${sign} ${Math.abs(p)}% vs prev week</div>`;
}

function delta(curr, prev, goodDir) {
  if (!prev || !curr) return '';
  const p = Math.round(((curr - prev) / prev) * 100);
  const sign = p >= 0 ? '+' : '';
  let cls = p >= 0 ? 'delta-pos' : 'delta-neg';
  if (goodDir === 'down' && p < 0) cls = 'delta-good-neg';
  if (goodDir === 'down' && p > 0) cls = 'delta-neg';
  return `<span class="comp-delta ${cls}">${sign}${p}%</span>`;
}

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  charts = {};
}

function mkChart(id, config) {
  const el = document.getElementById(id);
  if (!el) return;
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(el, config);
}

const WEEK_LABELS = () => weeks.map(w => w.week_label);

// ════════════════════════════════════════════
//  RENDER MASTER
// ════════════════════════════════════════════
function render() {
  renderTabs();
  renderCompStrip();
  renderDashboard();
}

async function switchWeek(idx) {
  active = idx;
  destroyCharts();
  await loadWAForWeek(idx);
  updateBadges();
  render();
}

// ════════════════════════════════════════════
//  TABS
// ════════════════════════════════════════════
function renderTabs() {
  document.getElementById('hPeriod').textContent = weeks[active].period;
  document.getElementById('tabsWrap').innerHTML = weeks.map((w,i) => `
    <div class="tab ${i === active ? 'active' : ''}" onclick="switchWeek(${i})">
      <div class="tab-label">
        ${w.week_label}
        ${w.is_partial ? '<span class="partial-note">Partial</span>' : ''}
      </div>
      <div class="tab-dates">${w.period}</div>
    </div>
  `).join('');
}

// ════════════════════════════════════════════
//  COMPARISON STRIP
// ════════════════════════════════════════════
function renderCompStrip() {
  const BAR_MAX_H = 32;
  const html = COMP_METRICS.map(m => {
    const vals = weeks.map(wk => get(wk, m.path));
    const maxV = Math.max(...vals.filter(v => v > 0), 1);
    const curr = vals[active];
    const prev = active > 0 ? vals[active-1] : null;

    const barsHtml = vals.map((v,i) => {
      const h = v > 0 ? Math.max(4, Math.round((v/maxV)*BAR_MAX_H)) : 4;
      const isCurr = i === active;
      return `
        <div class="comp-bar-wrap">
          <div class="comp-bar-val ${isCurr?'current':''}">${fmtVal(v,m.fmt)}</div>
          <div class="comp-bar-bg ${isCurr?'current':''}" style="height:${h}px"></div>
          <div class="comp-bar-wk ${isCurr?'current':''}">${weeks[i].week_label}</div>
        </div>`;
    }).join('');

    return `
      <div class="comp-metric">
        <div class="comp-metric-label">${m.label}</div>
        <div class="comp-bars">${barsHtml}</div>
        ${delta(curr, prev, m.goodDir)}
      </div>`;
  }).join('');

  document.getElementById('compStrip').innerHTML = html;
}

// ════════════════════════════════════════════
//  DASHBOARD
// ════════════════════════════════════════════
function renderDashboard() {
  const w    = weeks[active];
  const prev = active > 0 ? weeks[active-1] : null;

  document.getElementById('mainContent').innerHTML = `
    ${renderCrmSummary(w, prev)}
    ${renderChannelSummary(w, prev)}
    ${renderTrendChart()}
    ${renderInsights(w)}
  `;

  requestAnimationFrame(() => drawWeeklyTrend());
}

// ════════════════════════════════════════════
//  CRM SUMMARY STRIP — общая сводка из CRM
// ════════════════════════════════════════════
function renderCrmSummary(w, prev) {
  const p = prev;
  const l = w.leads;
  if (!l) return '';

  // Источники лидов — топ строка
  const src = l.by_source || {};
  const srcItems = Object.entries(src)
    .filter(([,v]) => v > 0)
    .sort((a,b) => b[1]-a[1])
    .map(([k,v]) => `
      <div class="crm-src-item">
        <span class="crm-src-name">${srcLabel(k)}</span>
        <span class="crm-src-val">${v}</span>
        <div class="crm-src-bar">
          <div class="crm-src-bar-fill" style="width:${Math.round(v/l.total*100)}%"></div>
        </div>
        <span class="crm-src-pct">${Math.round(v/l.total*100)}%</span>
      </div>`)
    .join('');

  const kpis = [
    {
      val: l.total,
      label: 'Total from CRM',
      sub: `${w.week_label} · ${w.period}`,
      cls: 'k-black',
      trend: trendHtml(l.total, p?.leads?.total, 'up'),
    },
    {
      val: l.in_communication,
      label: 'In Communication',
      sub: pct(l.in_communication, l.total) != null
        ? `${pct(l.in_communication, l.total)}% of total` : '',
      cls: 'k-green',
      trend: trendHtml(l.in_communication, p?.leads?.in_communication, 'up'),
    },
    {
      val: l.qualified,
      label: 'Qualified',
      sub: pct(l.qualified, l.total) != null
        ? `${pct(l.qualified, l.total)}% of total` : '',
      cls: 'k-blue',
      trend: trendHtml(l.qualified, p?.leads?.qualified, 'up'),
    },
    {
      val: l.follow_up,
      label: 'Follow-Up',
      sub: 'Active pipeline',
      cls: 'k-purple',
      trend: trendHtml(l.follow_up, p?.leads?.follow_up, 'up'),
    },
    {
      val: l.prospect_lost,
      label: 'Prospect Lost',
      sub: pct(l.prospect_lost, l.total) != null
        ? `${pct(l.prospect_lost, l.total)}% loss rate` : '',
      cls: 'k-red',
      trend: trendHtml(l.prospect_lost, p?.leads?.prospect_lost, 'down'),
    },
    {
      val: l.junk,
      label: 'Junk / Invalid',
      sub: pct(l.junk, l.total) != null
        ? `${pct(l.junk, l.total)}% filtered` : '',
      cls: 'k-amber',
      trend: trendHtml(l.junk, p?.leads?.junk, 'down'),
    },
  ];

  return `
    <div class="sec-head">
      <div class="sec-icon">📊</div>
      <div class="sec-title">CRM — All Sources Combined
        <span class="sec-sub">week ${w.week_label} · ${w.period}</span>
      </div>
    </div>

    <div class="kpi-grid">
      ${kpis.map(k => `
        <div class="kpi ${k.cls}">
          <div class="kpi-label">${k.label}</div>
          <div class="kpi-value">${k.val ?? '—'}</div>
          ${k.sub ? `<div class="kpi-sub">${k.sub}</div>` : ''}
          ${k.trend}
        </div>`).join('')}
    </div>

    <div class="crm-sources">
      <div class="crm-sources-title">Sources breakdown</div>
      <div class="crm-src-list">${srcItems}</div>
    </div>`;
}

function srcLabel(k) {
  const map = {
    facebook:           'Facebook Ads',
    whatsapp_outreach:  'WhatsApp',
    red_quiz:           'RED Quiz',
    property_finder:    'Property Finder',
    website:            'Website',
    instagram:          'Instagram',
    other:              'Other',
  };
  return map[k] || k.replace(/_/g,' ');
}

// ════════════════════════════════════════════
//  CHANNEL CARDS
// ════════════════════════════════════════════
function renderChannelSummary(w, prev) {
  const p = prev;

  // ── META ──────────────────────────────────
  const metaLeads  = w.meta?.leads_form || 0;
  // Квалифицированные от Meta — берём из by_source facebook
  // и соотносим с общим qualified пропорционально
  const fbShare    = w.leads?.by_source?.facebook || 0;
  const totalSrc   = w.leads?.total || 1;
  // Приблизительный qual от Meta (пропорция)
  const metaQual   = w.leads?.qualified
    ? Math.round(w.leads.qualified * (fbShare / totalSrc))
    : 0;
  const metaQualPct = metaLeads ? pct(metaQual, metaLeads) : null;
  // Конверсия form → CRM lead (facebook / leads_form)
  const metaConv   = metaLeads ? pct(fbShare, metaLeads) : null;

  const metaCplDelta = p?.meta?.cpl_aed
    ? deltaPct(w.meta?.cpl_aed, p.meta.cpl_aed) : null;
  const metaCplDeltaHtml = metaCplDelta !== null
    ? `<span class="chan-delta ${metaCplDelta < 0 ? 'good' : 'bad'}">
        ${metaCplDelta > 0 ? '↑' : '↓'} CPL ${Math.abs(metaCplDelta)}% vs prev
       </span>` : '';

  // ── WHATSAPP ──────────────────────────────
  const waData   = waCache[w.week_num];
  const waLeads  = w.leads?.by_source?.whatsapp_outreach || 0;
  // WA qual — из crm_leads если есть wa файл
  const waQual   = waData?.crm_qualified || 0;
  const waQualPct = waLeads ? pct(waQual, waLeads) : null;
  // Конверсия: WA replied → CRM lead
  const waReplied = w.whatsapp_outreach?.replied || waData?.replies_wa || 0;
  const waConv   = waReplied ? pct(waLeads, waReplied) : null;

  const waCardStats = `
    <div class="chan-stat-row">
      <div class="chan-stat">
        <div class="chan-stat-val">${fmtNum(waLeads)}</div>
        <div class="chan-stat-lbl">Leads (CRM)</div>
      </div>
      <div class="chan-stat">
        <div class="chan-stat-val">${fmtNum(waQual) || '—'}</div>
        <div class="chan-stat-lbl">Qualified</div>
      </div>
      <div class="chan-stat">
        <div class="chan-stat-val">${waQualPct != null ? waQualPct+'%' : '—'}</div>
        <div class="chan-stat-lbl">Qual rate</div>
      </div>
      <div class="chan-stat">
        <div class="chan-stat-val">${waConv != null ? waConv+'%' : '—'}</div>
        <div class="chan-stat-lbl">Reply→Lead</div>
      </div>
    </div>
    <div class="chan-delivery-row">
      ${waData ? `
        <span class="chan-tag">📦 ${waData.delivery_rate_pct}% delivered</span>
        <span class="chan-tag">💬 ${waData.replies_wa} WA replies</span>
        <span class="chan-tag">✅ ${waData.crm_positive} positive pipeline</span>
      ` : `
        <span class="chan-tag neutral">${w.whatsapp_outreach?.campaigns?.length || 0} campaigns · ${w.whatsapp_outreach?.contacted || w.whatsapp_outreach?.contacts_sent || 0} sent</span>
      `}
    </div>`;

  // ── RED ───────────────────────────────────
  const redLeads  = w.red_quiz_leads?.length || 0;
  const redQual   = w.red_quiz_leads?.filter(l => l.status === 'Qualified').length || 0;
  const redInComm = w.red_quiz_leads?.filter(l => l.status === 'In Communication').length || 0;
  const redActive = redQual + redInComm +
    (w.red_quiz_leads?.filter(l => l.status?.startsWith('Follow')).length || 0);
  const redQualPct = redLeads ? pct(redQual, redLeads) : null;
  // Конверсия: CRM red_quiz / quiz submissions — нет данных по views, ставим —
  const redCountries = w.red_quiz_leads
    ? [...new Set(w.red_quiz_leads.map(l => l.country))].length : 0;
  const redInvestors = w.red_quiz_leads
    ? w.red_quiz_leads.filter(l => l.purpose === 'invest').length : 0;

  // ── INSTAGRAM / SMM ───────────────────────
  const smmReachDelta = p?.smm?.reach
    ? deltaPct(w.smm?.reach, p.smm.reach) : null;
  const smmDeltaHtml = smmReachDelta !== null
    ? `<span class="chan-delta ${smmReachDelta > 0 ? 'good' : 'bad'}">
        ${smmReachDelta > 0 ? '↑' : '↓'} ${Math.abs(smmReachDelta)}% reach vs prev
       </span>` : '';

  return `
    <div class="sec-head" style="margin-top:28px">
      <div class="sec-icon">📡</div>
      <div class="sec-title">Channels at a Glance — click to explore</div>
    </div>
    <div class="channel-grid">

      <!-- ═══ META ADS ═══ -->
      <a href="meta.html" class="channel-card c-meta">
        <div class="channel-header">
          <div class="channel-icon-wrap">
            <span class="channel-icon">◈</span>
            <span class="channel-name">Meta Ads</span>
          </div>
          <span class="channel-arrow">→</span>
        </div>

        <!-- Строка спенд + CPL -->
        <div class="chan-top-row">
          <div class="chan-top-item">
            <div class="chan-top-val">${fmtAed(w.meta?.spend_aed)}</div>
            <div class="chan-top-lbl">Spend</div>
          </div>
          <div class="chan-top-item">
            <div class="chan-top-val">${fmtAed(w.meta?.cpl_aed)}</div>
            <div class="chan-top-lbl">CPL</div>
          </div>
          <div class="chan-top-item">
            <div class="chan-top-val">${fmtNum(w.meta?.impressions ? Math.round(w.meta.impressions/1000)+'k' : null)}</div>
            <div class="chan-top-lbl">Impressions</div>
          </div>
        </div>

        <!-- Воронка лидов -->
        <div class="chan-funnel">
          <div class="chan-funnel-item">
            <span class="chan-funnel-lbl">Form leads</span>
            <span class="chan-funnel-val">${fmtNum(metaLeads)}</span>
          </div>
          <div class="chan-funnel-arrow">↓</div>

// ════════════════════════════════════════════
//  INSIGHTS
// ════════════════════════════════════════════
function renderInsights(w) {
  const prev   = active > 0 ? weeks[active-1] : null;
  const waData = waCache[w.week_num];
  const auto   = generateAutoInsights(w, prev, waData);
  const ins    = w.insights || {};

  const manualItems = [
    { key: 'general', label: 'General',   icon: '💡' },
    { key: 'meta',    label: 'Meta Ads',  icon: '◈'  },
    { key: 'smm',     label: 'Instagram', icon: '✦'  },
    { key: 'wa',      label: 'WhatsApp',  icon: '💬' },
    { key: 'red',     label: 'RED',       icon: '◉'  },
    { key: 'leads',   label: 'Leads',     icon: '🎯' },
  ].filter(i => ins[i.key]);

  if (!auto.length && !manualItems.length) return '';

  return `
    <div class="sec-head" style="margin-top:28px">
      <div class="sec-icon">💡</div>
      <div class="sec-title">Weekly Insights
        <span style="font-size:10px;color:var(--text-muted);
          font-weight:400;margin-left:8px;">
          auto-generated · ${w.week_label}
        </span>
      </div>
    </div>
    <div class="insights-grid">
      ${auto.map(item => `
        <div class="insight ${item.cls || ''}">
          <div class="insight-tag">${item.icon} ${item.label}</div>
          <div class="insight-text">${item.text}</div>
        </div>`).join('')}
      ${manualItems.map(i => `
        <div class="insight">
          <div class="insight-tag">${i.icon} ${i.label}</div>
          <div class="insight-text">${ins[i.key]}</div>
        </div>`).join('')}
    </div>`;
}

// ════════════════════════════════════════════
//  AUTO INSIGHTS
// ════════════════════════════════════════════
function generateAutoInsights(w, prev, waData) {
  const p   = prev;
  const ins = [];

  // ── META ──
  if (w.meta?.cpl_aed && p?.meta?.cpl_aed) {
    const d = deltaPct(w.meta.cpl_aed, p.meta.cpl_aed);
    if (d <= -10) ins.push({
      icon: '◈', label: 'Meta Ads', cls: 'i-meta',
      text: `CPL dropped ${Math.abs(d)}% vs last week
        (${p.meta.cpl_aed}₟ → ${w.meta.cpl_aed}₟) —
        campaign efficiency improving.`
    });
    else if (d >= 15) ins.push({
      icon: '◈', label: 'Meta Ads', cls: 'i-meta',
      text: `⚠️ CPL up ${d}% vs last week
        (${p.meta.cpl_aed}₟ → ${w.meta.cpl_aed}₟) —
        review creatives and targeting.`
    });
  }

  if (w.meta?.leads_form && p?.meta?.leads_form) {
    const d = deltaPct(w.meta.leads_form, p.meta.leads_form);
    if (d >= 20) ins.push({
      icon: '◈', label: 'Meta Ads', cls: 'i-meta',
      text: `Meta leads +${d}% (${p.meta.leads_form} → ${w.meta.leads_form}).
        Strong form performance.`
    });
    else if (d <= -20) ins.push({
      icon: '◈', label: 'Meta Ads', cls: 'i-meta',
      text: `Meta leads down ${Math.abs(d)}%
        (${p.meta.leads_form} → ${w.meta.leads_form}).
        Check ad fatigue.`
    });
  }

  // ── SMM ──
  if (w.smm?.reach && p?.smm?.reach) {
    const d = deltaPct(w.smm.reach, p.smm.reach);
    if (d >= 20) ins.push({
      icon: '✦', label: 'Instagram', cls: 'i-smm',
      text: `Reach +${d}%
        (${(p.smm.reach/1000).toFixed(1)}k → ${(w.smm.reach/1000).toFixed(1)}k).
        Strong content performance.`
    });
    else if (d <= -20) ins.push({
      icon: '✦', label: 'Instagram', cls: 'i-smm',
      text: `Reach −${Math.abs(d)}%
        (${(p.smm.reach/1000).toFixed(1)}k → ${(w.smm.reach/1000).toFixed(1)}k).
        Review posting frequency.`
    });
  }

  if (w.smm?.reach && w.smm?.link_clicks) {
    const ctr = ((w.smm.link_clicks / w.smm.reach)*100).toFixed(2);
    if (ctr < 0.1) ins.push({
      icon: '✦', label: 'Instagram', cls: 'i-smm',
      text: `IG CTR is ${ctr}% — high reach but low CTA conversion.
        Test stronger calls-to-action.`
    });
  }

  // ── WHATSAPP ──
  if (waData) {
    if (waData.failed_rate_pct >= 60) ins.push({
      icon: '💬', label: 'WhatsApp', cls: '',
      text: `🔴 WA failed rate ${waData.failed_rate_pct}% —
        verify base quality before next launch.`
    });
    else if (waData.delivery_rate_pct >= 70) ins.push({
      icon: '💬', label: 'WhatsApp', cls: '',
      text: `✅ WA delivery ${waData.delivery_rate_pct}% —
        strong base quality. Reply/read rate: ${waData.reply_rate_of_read}%.`
    });
    if (waData.crm_opt_out > 0) {
      const r = waData.crm_total
        ? Math.round(waData.crm_opt_out / waData.crm_total * 100) : 0;
      if (r >= 5) ins.push({
        icon: '💬', label: 'WhatsApp', cls: '',
        text: `Opt-out rate ${r}% (${waData.crm_opt_out} contacts) —
          review message tone.`
      });
    }
  }

  // ── RED ──
  if (w.red_quiz_leads?.length) {
    const total    = w.red_quiz_leads.length;
    const qual     = w.red_quiz_leads.filter(l => l.status === 'Qualified').length;
    const qualPct  = Math.round(qual/total*100);
    const invest   = w.red_quiz_leads.filter(l => l.purpose === 'invest').length;
    if (qualPct >= 40) ins.push({
      icon: '◉', label: 'RED', cls: '',
      text: `High RED qual rate: ${qual}/${total} (${qualPct}%).
        ${invest} investors — strong intent.`
    });
    if (p?.red_quiz_leads?.length) {
      const d = deltaPct(total, p.red_quiz_leads.length);
      if (d >= 30) ins.push({
        icon: '◉', label: 'RED', cls: '',
        text: `RED leads +${d}% vs last week
          (${p.red_quiz_leads.length} → ${total}).`
      });
    }
  }

  // ── GENERAL ──
  if (w.leads?.junk && w.leads?.total) {
    const r = Math.round(w.leads.junk / w.leads.total * 100);
    if (r >= 30) ins.push({
      icon: '📊', label: 'General', cls: '',
      text: `⚠️ Junk rate ${r}%
        (${w.leads.junk}/${w.leads.total}) —
        review targeting across channels.`
    });
  }

  if (w.leads?.total && p?.leads?.total) {
    const d = deltaPct(w.leads.total, p.leads.total);
    if (d >= 50) ins.push({
      icon: '📊', label: 'General', cls: '',
      text: `Total CRM leads +${d}% vs last week
        (${p.leads.total} → ${w.leads.total}) —
        best week so far. Identify top driver.`
    });
  }

  return ins;
}
