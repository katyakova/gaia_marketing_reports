<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaia · Marketing Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: #ECEAE7;
  color: #1A1A1A;
  min-height: 100vh;
  font-size: 13px;
}

/* ── HEADER ── */
.header {
  background: #111111;
  padding: 0 36px;
  display: flex;
  align-items: stretch;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  min-height: 56px;
}
.logo-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 0;
  flex-shrink: 0;
}
.logo-mark {
  width: 32px; height: 32px;
  background: #FFFFFF;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 14px; color: #111;
  letter-spacing: -1px;
}
.logo-name { font-size: 18px; font-weight: 700; color: #FFF; letter-spacing: 3px; }
.logo-sub  { font-size: 9px; color: #555; letter-spacing: 3px; text-transform: uppercase; margin-top: 1px; }

/* ── NAV ── */
.nav-menu {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  padding: 0 28px;
  overflow-x: auto;
}
.nav-sep {
  width: 1px; height: 20px;
  background: #2A2A2A;
  flex-shrink: 0;
  margin: 0 4px;
}
.nav-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 13px;
  border-radius: 7px;
  cursor: pointer;
  border: none;
  text-decoration: none;
  transition: all .2s;
  white-space: nowrap;
  flex-shrink: 0;
  position: relative;
}
.nav-btn:hover {
  transform: translateY(-1px);
  filter: brightness(1.1);
}
.nav-btn.active {
  box-shadow: 0 0 0 2px #FFF;
}
.nav-btn .nav-btn-icon  { font-size: 14px; line-height: 1; }
.nav-btn .nav-btn-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: #FFF;
}
.nav-btn .nav-btn-badge {
  background: rgba(0,0,0,0.25);
  color: #FFF;
  font-size: 9px; font-weight: 700;
  padding: 1px 5px; border-radius: 8px;
  min-width: 18px; text-align: center;
}

/* ── КНОПКИ ЦВЕТА ── */
.btn-dashboard { background: #333333; }
.btn-meta      { background: #1877F2; }
.btn-smm       { background: linear-gradient(135deg,#833AB4,#E1306C,#F77737); }
.btn-leads     { background: #22c55e; }
.btn-wa        { background: #25D366; }
.btn-red       { background: #E53935; }

/* ── HEADER RIGHT ── */
.header-right {
  text-align: right;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 12px 0;
  flex-shrink: 0;
}
.header-title  { font-size: 11px; font-weight: 600; color: #FFF; letter-spacing: 2px; text-transform: uppercase; }
.header-period { font-size: 10px; color: #555; margin-top: 3px; }

/* ── MOBILE ── */
@media (max-width: 1100px) {
  .header { padding: 0 16px; }
  .nav-menu { padding: 0 10px; gap: 4px; }
  .nav-btn  { padding: 5px 10px; }
  .nav-btn .nav-btn-label { display: none; }
  .nav-btn .nav-btn-icon  { font-size: 16px; }
  .nav-btn .nav-btn-badge { display: none; }
  .nav-sep  { margin: 0 2px; }
  .header-right { display: none; }
}
@media (max-width: 600px) {
  .logo-name { font-size: 15px; }
}

/* ── WEEK TABS ── */
.tabs-wrap {
  background: #FFF;
  border-bottom: 1px solid #E0DDD9;
  padding: 0 36px;
  display: flex;
  gap: 0;
  overflow-x: auto;
}
.tab {
  padding: 14px 24px 12px;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all .2s;
  white-space: nowrap;
  user-select: none;
}
.tab-label { font-size: 12px; font-weight: 700; letter-spacing: 1px; color: #AAAAAA; }
.tab-dates { font-size: 10px; color: #BBBBBB; margin-top: 2px; }
.tab:hover .tab-label { color: #333; }
.tab.active { border-bottom-color: #111; }
.tab.active .tab-label { color: #111; }
.tab.active .tab-dates  { color: #666; }

/* ── COMPARISON STRIP ── */
.comp-strip {
  background: #1A1A1A;
  padding: 10px 36px;
  display: flex;
  align-items: center;
  gap: 0;
  overflow-x: auto;
}
.comp-metric {
  display: flex;
  flex-direction: column;
  padding: 6px 20px 6px 0;
  margin-right: 20px;
  border-right: 1px solid #2E2E2E;
  min-width: 120px;
}
.comp-metric:last-child { border-right: none; }
.comp-metric-label {
  font-size: 9px; color: #555;
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 6px;
}
.comp-bars { display: flex; gap: 8px; align-items: flex-end; }
.comp-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.comp-bar-val {
  font-size: 13px; font-weight: 700; color: #888;
  line-height: 1;
}
.comp-bar-val.current { color: #FFFFFF; font-size: 15px; }
.comp-bar-bg {
  width: 28px; border-radius: 3px 3px 0 0;
  background: #2E2E2E; min-height: 4px;
  transition: all .3s;
}
.comp-bar-bg.current { background: #FFFFFF; }
.comp-bar-wk { font-size: 9px; color: #444; margin-top: 2px; }
.comp-bar-wk.current { color: #888; }
.comp-delta {
  font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 3px;
  margin-top: 4px; align-self: flex-start;
}
.delta-pos      { background: rgba(74,222,128,.15); color: #4ade80; }
.delta-neg      { background: rgba(248,113,113,.15); color: #f87171; }
.delta-good-neg { background: rgba(74,222,128,.15); color: #4ade80; }

/* ── MAIN LAYOUT ── */
.main { padding: 28px 36px; }

/* ── SECTION HEADER ── */
.sec-head {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px; margin-top: 28px;
}
.sec-head:first-child { margin-top: 0; }
.sec-icon {
  width: 24px; height: 24px; border-radius: 5px;
  background: #1A1A1A;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.sec-title {
  font-size: 10px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; color: #888;
}

/* ── KPI CARDS ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.kpi {
  background: #FFF;
  border-radius: 10px;
  padding: 16px 18px 14px;
  border: 1px solid #E4E2DF;
  position: relative;
  overflow: hidden;
}
.kpi::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  border-radius: 10px 10px 0 0;
}
.kpi.k-black::after  { background: #1A1A1A; }
.kpi.k-green::after  { background: #22c55e; }
.kpi.k-amber::after  { background: #f59e0b; }
.kpi.k-red::after    { background: #ef4444; }
.kpi.k-blue::after   { background: #3b82f6; }
.kpi.k-purple::after { background: #8b5cf6; }
.kpi.k-pink::after   { background: #ec4899; }

.kpi-label {
  font-size: 9px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1px; color: #999;
}
.kpi-value {
  font-size: 32px; font-weight: 800;
  line-height: 1; margin: 8px 0 4px;
  color: #1A1A1A;
}
.kpi-sub   { font-size: 10px; color: #AAA; }
.kpi-trend { font-size: 11px; font-weight: 600; margin-top: 5px; }
.trend-up        { color: #22c55e; }
.trend-down      { color: #ef4444; }
.trend-good-down { color: #22c55e; }
.trend-neutral   { color: #999; }

/* ── CHART CARDS ── */
.chart-grid-2 {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 14px; margin-bottom: 20px;
}
.chart-grid-3 {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 14px; margin-bottom: 20px;
}
.chart-card {
  background: #FFF;
  border-radius: 10px;
  padding: 20px;
  border: 1px solid #E4E2DF;
}
.chart-card.span-2 { grid-column: span 2; }
.chart-card.span-3 { grid-column: span 3; }
.chart-card h3 {
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px; color: #999;
  margin-bottom: 16px;
}
.chart-wrap { position: relative; }

/* ── INSIGHTS ── */
.insights-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.insight {
  background: #FFF;
  border-radius: 10px;
  padding: 16px 18px;
  border: 1px solid #E4E2DF;
  border-left: 4px solid #1A1A1A;
}
.insight.i-meta   { border-left-color: #3b82f6; }
.insight.i-smm    { border-left-color: #8b5cf6; }
.insight.i-leads  { border-left-color: #22c55e; }
.insight.i-wa     { border-left-color: #f59e0b; }
.insight-tag {
  font-size: 9px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; color: #AAA;
  margin-bottom: 6px;
}
.insight-text { font-size: 12px; line-height: 1.65; color: #333; }

/* ── TABLE CARD ── */
.table-card {
  background: #FFF;
  border-radius: 10px;
  border: 1px solid #E4E2DF;
  overflow: hidden;
  margin-bottom: 20px;
}
.table-card h3 {
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px; color: #999;
  padding: 16px 20px 12px;
  border-bottom: 1px solid #F0EDEA;
}
table { width: 100%; border-collapse: collapse; }
th {
  padding: 9px 16px;
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: #AAA; text-align: left;
  background: #FAFAF9;
  border-bottom: 1px solid #F0EDEA;
}
td {
  padding: 9px 16px;
  border-bottom: 1px solid #F7F6F4;
  font-size: 12px; color: #333;
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: #FAFAF9; }

/* ── BADGES ── */
.badge {
  display: inline-block;
  padding: 2px 8px; border-radius: 4px;
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.b-qualified { background: #dcfce7; color: #15803d; }
.b-comm      { background: #fef9c3; color: #a16207; }
.b-fu        { background: #ede9fe; color: #6d28d9; }
.b-lost      { background: #fee2e2; color: #b91c1c; }
.b-junk      { background: #f1f5f9; color: #475569; }
.b-new       { background: #dbeafe; color: #1d4ed8; }
.b-owner     { background: #fce7f3; color: #9d174d; }
.b-future    { background: #e0f2fe; color: #0369a1; }

.flag { font-size: 14px; margin-right: 4px; }

/* ── WA CAMPAIGNS ── */
.wa-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px; margin-bottom: 20px;
}
.wa-card {
  background: #FFF;
  border-radius: 10px;
  padding: 14px 16px;
  border: 1px solid #E4E2DF;
  border-top: 3px solid #f59e0b;
}
.wa-name { font-size: 11px; font-weight: 700; color: #1A1A1A; margin-bottom: 8px; }
.wa-stat { display: flex; justify-content: space-between; margin-bottom: 3px; }
.wa-stat-label { font-size: 10px; color: #999; }
.wa-stat-val   { font-size: 10px; font-weight: 600; color: #333; }

/* ── FOOTER ── */
.footer {
  background: #111;
  color: #444;
  text-align: center;
  padding: 18px;
  font-size: 10px;
  letter-spacing: 1px;
  margin-top: 40px;
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .chart-grid-2, .chart-grid-3 { grid-template-columns: 1fr; }
  .chart-card.span-2, .chart-card.span-3 { grid-column: span 1; }
  .main { padding: 16px; }
  .tabs-wrap { padding: 0 16px; }
  .comp-strip { padding: 10px 16px; }
}

/* ── EMPTY STATE ── */
.empty { color: #AAA; font-style: italic; font-size: 12px; }
.partial-note {
  display: inline-block;
  background: #FFF8E1;
  color: #B45309;
  font-size: 9px; font-weight: 600;
  padding: 2px 8px; border-radius: 4px;
  margin-left: 8px; vertical-align: middle;
  text-transform: uppercase; letter-spacing: 0.5px;
}

</style>
</head>
<body>

<!-- ═══════════════════════════════════════ -->
<!--  HEADER                                -->
<!-- ═══════════════════════════════════════ -->
<header class="header">

  <!-- LOGO -->
  <div class="logo-wrap">
    <div class="logo-mark">G</div>
    <div>
      <div class="logo-name">GAIA</div>
      <div class="logo-sub">Real Estate</div>
    </div>
  </div>

  <!-- NAV MENU -->
  <nav class="nav-menu">

    <button class="nav-btn btn-dashboard active" id="nav-dashboard"
            onclick="switchView('dashboard')">
      <span class="nav-btn-icon">📊</span>
      <span class="nav-btn-label">Dashboard</span>
    </button>

    <div class="nav-sep"></div>

    <button class="nav-btn btn-meta" id="nav-meta"
            onclick="switchView('meta')">
      <span class="nav-btn-icon">💰</span>
      <span class="nav-btn-label">Meta</span>
      <span class="nav-btn-badge" id="badge-meta">—</span>
    </button>

    <button class="nav-btn btn-smm" id="nav-smm"
            onclick="switchView('smm')">
      <span class="nav-btn-icon">📸</span>
      <span class="nav-btn-label">Instagram</span>
      <span class="nav-btn-badge" id="badge-smm">—</span>
    </button>

    <div class="nav-sep"></div>

    <button class="nav-btn btn-leads" id="nav-leads"
            onclick="switchView('leads')">
      <span class="nav-btn-icon">🎯</span>
      <span class="nav-btn-label">Leads</span>
      <span class="nav-btn-badge" id="badge-leads">—</span>
    </button>

    <button class="nav-btn btn-wa" id=""
            onclick="switchView('whatsapp')">
      <span class="nav-btn-icon">💬</span>
      <span class="nav-btn-label">WhatsApp</span>
      <span class="nav-btn-badge" id="badge-wa">—</span>
    </button>

    <button class="nav-btn btn-red" id="nav-red"
            onclick="switchView('red')">
      <span class="nav-btn-icon">🔴</span>
      <span class="nav-btn-label">RED Quiz</span>
      <span class="nav-btn-badge" id="badge-red">—</span>
    </button>

  </nav>

  <!-- HEADER RIGHT -->
  <div class="header-right">
    <div class="header-title">Marketing Dashboard</div>
    <div class="header-period" id="hPeriod">Loading…</div>
  </div>

</header>

<!-- ═══════════════════════════════════════ -->
<!--  WEEK TABS                             -->
<!-- ═══════════════════════════════════════ -->
<div class="tabs-wrap" id="tabsWrap"></div>

<!-- ═══════════════════════════════════════ -->
<!--  COMPARISON STRIP                      -->
<!-- ═══════════════════════════════════════ -->
<div class="comp-strip" id="compStrip"></div>

<!-- ═══════════════════════════════════════ -->
<!--  MAIN CONTENT                          -->
<!-- ═══════════════════════════════════════ -->
<main class="main" id="mainContent">
  <p style="color:#AAA;padding:40px 0;text-align:center">Loading data…</p>
</main>

<!-- ═══════════════════════════════════════ -->
<!--  FOOTER                                -->
<!-- ═══════════════════════════════════════ -->
<footer class="footer">
  GAIA Real Estate &nbsp;·&nbsp; Marketing Dashboard &nbsp;·&nbsp;
  Week runs Fri → Wed &nbsp;·&nbsp; Report day: Thursday
</footer>

<!-- ═══════════════════════════════════════ -->
<!--  JAVASCRIPT                            -->
<!-- ═══════════════════════════════════════ -->
<script>

// ════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════
const WEEK_FILES = [
  'data/week_01.json',
  'data/week_02.json',
  'data/week_03.json',
  'data/week_04.json',
  'data/week_05.json'
];

const COMP_METRICS = [
  { path: 'leads.total',            label: 'Total Leads', goodDir: 'up',   fmt: 'num' },
  { path: 'leads.in_communication', label: 'In Comm',     goodDir: 'up',   fmt: 'num' },
  { path: 'leads.qualified',        label: 'Qualified',   goodDir: 'up',   fmt: 'num' },
  { path: 'meta.spend_aed',         label: 'Meta Spend',  goodDir: 'none', fmt: 'aed' },
  { path: 'meta.leads_form',        label: 'Meta Leads',  goodDir: 'up',   fmt: 'num' },
  { path: 'meta.cpl_aed',           label: 'CPL AED',     goodDir: 'down', fmt: 'aed' },
  { path: 'smm.reach',              label: 'IG Reach',    goodDir: 'up',   fmt: 'k'   },
  { path: 'smm.link_clicks',        label: 'IG Clicks',   goodDir: 'up',   fmt: 'num' },
];

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let weeks       = [];
let active      = 0;
let charts      = {};
let currentView = 'dashboard';

const VIEW_BTN_MAP = {
  'dashboard': 'nav-dashboard',
  'meta':      'nav-meta',
  'smm':       'nav-smm',
  'leads':     'nav-leads',
  'whatsapp':  '',
  'red':       'nav-red',
};

// ════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════
(async function boot() {
  try {
    const results = await Promise.allSettled(
      WEEK_FILES.map(f => fetch(f).then(r => {
        if (!r.ok) throw new Error(r.status);
        return r.json();
      }))
    );
    weeks = results
      .map(r => r.status === 'fulfilled' ? r.value : null)
      .filter(Boolean);

    if (!weeks.length) throw new Error('No data files found');
    active = weeks.length - 1;
    updateBadges();
    render();
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      `<p style="color:#ef4444;padding:40px;text-align:center">
        ⚠️ Could not load data files.<br>
        <small style="color:#999">
          Make sure data/week_0X.json files exist in your repo.<br>
          ${e.message}
        </small>
      </p>`;
  }
})();

// ════════════════════════════════════════════
//  BADGES
// ════════════════════════════════════════════
function updateBadges() {
  const w = weeks[active];
  if (!w) return;

  const spend = w.meta?.spend_aed;
  document.getElementById('badge-meta').textContent =
    spend ? spend.toLocaleString() : '—';

  const reach = w.smm?.reach;
  document.getElementById('badge-smm').textContent =
    reach ? (reach >= 1000 ? Math.round(reach/1000)+'k' : reach) : '—';

  document.getElementById('badge-leads').textContent =
    w.leads?.total || '—';

  document.getElementById('badge-wa').textContent =
    w.whatsapp_outreach?.in_communication || '—';

  document.getElementById('badge-red').textContent =
    w.red_quiz_leads?.length || '—';
}

// ════════════════════════════════════════════
//  VIEW SWITCHING
// ════════════════════════════════════════════
function switchView(view) {
  currentView = view;

  // Активная кнопка
  Object.values(VIEW_BTN_MAP).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
  const btn = document.getElementById(VIEW_BTN_MAP[view]);
  if (btn) btn.classList.add('active');

  destroyCharts();

  const w    = weeks[active];
  const prev = active > 0 ? weeks[active - 1] : null;

  switch(view) {
    case 'dashboard':
      renderMain();
      break;
    case 'meta':
      document.getElementById('mainContent').innerHTML =
        renderMetaSection(w, prev) + renderInsights(w);
      requestAnimationFrame(() => { drawMetaTrend(); drawCPL(); });
      break;
    case 'smm':
      document.getElementById('mainContent').innerHTML =
        renderSmmSection(w, prev) + renderInsights(w);
      requestAnimationFrame(() => { drawSmmReach(); drawSmmEngage(w); });
      break;
    case 'leads':
      document.getElementById('mainContent').innerHTML =
        renderOverviewKPIs(w, prev) +
        renderLeadsSection(w, prev) +
        renderInsights(w);
      requestAnimationFrame(() => {
        drawLeadSource(w);
        drawLeadStatus(w);
        drawLeadTrend();
      });
      break;
    case 'whatsapp':
      document.getElementById('mainContent').innerHTML =
        renderWaSection(w, prev) + renderInsights(w);
      break;
    case 'red':
      document.getElementById('mainContent').innerHTML =
        (w.red_quiz_leads?.length ? renderRedQuiz(w) : `
          <div style="background:#FFF;border-radius:10px;padding:30px;
                      border:1px solid #E4E2DF;color:#AAA;font-size:13px">
            No RED Quiz leads this week.
          </div>`) + renderInsights(w);
      break;
  }
}

// ════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════
function get(obj, path) {
  return path.split('.').reduce((o, k) => (o != null ? o[k] : 0), obj) ?? 0;
}

function fmt(val, type) {
  if (val == null || val === 0) return '—';
  if (type === 'aed') return val.toLocaleString() + ' ₟';
  if (type === 'k')   return val >= 1000 ? (val/1000).toFixed(1) + 'k' : val;
  return val.toLocaleString();
}

function delta(curr, prev, goodDir) {
  if (!prev || !curr) return '';
  const pct = Math.round(((curr - prev) / prev) * 100);
  const sign = pct >= 0 ? '+' : '';
  let cls = pct >= 0 ? 'delta-pos' : 'delta-neg';
  if (goodDir === 'down' && pct < 0) cls = 'delta-good-neg';
  if (goodDir === 'down' && pct > 0) cls = 'delta-neg';
  return `<span class="comp-delta ${cls}">${sign}${pct}%</span>`;
}

function trendHtml(curr, prev, goodDir) {
  if (!prev || !curr) return '';
  const pct = Math.round(((curr - prev) / prev) * 100);
  const sign = pct >= 0 ? '↑' : '↓';
  let cls = 'trend-up';
  if (pct < 0 && goodDir !== 'down') cls = 'trend-down';
  if (pct < 0 && goodDir === 'down') cls = 'trend-good-down';
  if (pct > 0 && goodDir === 'down') cls = 'trend-down';
  const label = Math.abs(pct) + '% vs prev week';
  return `<div class="kpi-trend ${cls}">${sign} ${label}</div>`;
}

function statusBadge(s) {
  const map = {
    'Qualified':      'b-qualified',
    'In Communication':'b-comm',
    'Follow-Up 1':    'b-fu',
    'Follow-Up 2':    'b-fu',
    'Follow-Up 3':    'b-fu',
    'Follow-Up 4':    'b-fu',
    'Follow-Up 5':    'b-fu',
    'Prospect Lost':  'b-lost',
    'Junk Lead':      'b-junk',
    'New Leads':      'b-new',
    'Owner to sell':  'b-owner',
    'Future Follow-Up':'b-future',
  };
  const cls = map[s] || 'b-new';
  return `<span class="badge ${cls}">${s}</span>`;
}

function countryFlag(country) {
  const flags = {
    'United Kingdom': '🇬🇧', 'Serbia': '🇷🇸', 'Turkey': '🇹🇷',
    'Italy': '🇮🇹', 'India': '🇮🇳', 'Portugal': '🇵🇹',
    'Libya': '🇱🇾', 'Canada': '🇨🇦', 'Romania': '🇷🇴',
    'UAE': '🇦🇪', 'Germany': '🇩🇪', 'France': '🇫🇷',
    'Saudi Arabia': '🇸🇦', 'Kuwait': '🇰🇼', 'Qatar': '🇶🇦',
  };
  return flags[country] || '🌍';
}

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  charts = {};
}

// ════════════════════════════════════════════
//  RENDER MASTER
// ════════════════════════════════════════════
function render() {
  renderTabs();
  renderCompStrip();
  renderMain();
}

function switchWeek(idx) {
  active = idx;
  destroyCharts();
  renderTabs();
  renderCompStrip();
  renderMain();
  document.getElementById('hPeriod').textContent = weeks[active].period;
}

// ════════════════════════════════════════════
//  TABS
// ════════════════════════════════════════════
function renderTabs() {
  document.getElementById('hPeriod').textContent = weeks[active].period;
  document.getElementById('tabsWrap').innerHTML = weeks.map((w, i) => `
    <div class="tab ${i === active ? 'active' : ''}" onclick="switchWeek(${i})">
      <div class="tab-label">
        ${w.week_label}
        ${w.is_partial ? '<span class="partial-note">Partial</span>' : ''}
      </div>
      <div class="tab-dates">${w.period}</div>
    </div>
  `).join('');
}

// ════════════════════════════════════════════
//  COMPARISON STRIP
// ════════════════════════════════════════════
function renderCompStrip() {
  const w = weeks[active];
  const BAR_MAX_H = 32;

  const html = COMP_METRICS.map(m => {
    const vals = weeks.map(wk => get(wk, m.path));
    const maxV = Math.max(...vals.filter(v => v > 0), 1);
    const curr = vals[active];
    const prev = active > 0 ? vals[active - 1] : null;

    const barsHtml = vals.map((v, i) => {
      const h = v > 0 ? Math.max(4, Math.round((v / maxV) * BAR_MAX_H)) : 4;
      const isCurr = i === active;
      return `
        <div class="comp-bar-wrap">
          <div class="comp-bar-val ${isCurr ? 'current' : ''}">
            ${fmt(v, m.fmt)}
          </div>
          <div class="comp-bar-bg ${isCurr ? 'current' : ''}"
               style="height:${h}px"></div>
          <div class="comp-bar-wk ${isCurr ? 'current' : ''}">
            ${weeks[i].week_label}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="comp-metric">
        <div class="comp-metric-label">${m.label}</div>
        <div class="comp-bars">${barsHtml}</div>
        ${delta(curr, prev, m.goodDir)}
      </div>`;
  }).join('');

  document.getElementById('compStrip').innerHTML = html;
}

// ════════════════════════════════════════════
//  MAIN CONTENT
// ════════════════════════════════════════════
function renderMain() {
  const w = weeks[active];
  const prev = active > 0 ? weeks[active - 1] : null;

  const html = `
    ${renderOverviewKPIs(w, prev)}
    ${renderMetaSection(w, prev)}
    ${renderSmmSection(w, prev)}
    ${renderLeadsSection(w, prev)}
    ${renderWaSection(w, prev)}
    ${w.red_quiz_leads?.length ? renderRedQuiz(w) : ''}
    ${renderInsights(w)}
  `;

  document.getElementById('mainContent').innerHTML = html;
  drawCharts(w, prev);
}

  plugins: { legend: { display: false } },
  scales: {
    x: { grid: { display: false }, ticks: { font: { size: 10 } } },
    y: { grid: { color: '#F0EFED' }, ticks: { font: { size: 10 } } }
  },
  responsive: true,
  maintainAspectRatio: false,
};

function mkChart(id, config) {
  const el = document.getElementById(id);
  if (!el) return;
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(el, config);
}

      ...CHART_DEFAULTS,
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 } } },
        y: {
          grid: { color: '#F0EFED' },
          ticks: { font: { size: 10 },
            callback: v => v + ' ₟' }
        }
      }
    }
  });
}

function drawSmmReach() {
  mkChart('chartSmmReach', {
    type: 'line',
    data: {
      labels: WEEK_LABELS(),
      datasets: [
        {
          label: 'Reach',
          data: weeks.map(w => w.smm.reach || 0),
          borderColor: '#8b5cf6',
          backgroundColor: 'rgba(139,92,246,0.08)',
          fill: true, tension: 0.3,
          pointRadius: weeks.map((w, i) => i === active ? 6 : 3),
          pointBackgroundColor: '#8b5cf6',
        },
        {
          label: 'Views',
          data: weeks.map(w => w.smm.views || 0),
          borderColor: '#ec4899',
          backgroundColor: 'transparent',
          tension: 0.3,
          pointRadius: weeks.map((w, i) => i === active ? 6 : 3),
          pointBackgroundColor: '#ec4899',
          borderDash: [4, 3],
        }
      ]
    },
    options: {
      ...CHART_DEFAULTS,
      plugins: {
        legend: {
          display: true,
          labels: { font: { size: 10 }, boxWidth: 10 }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 } } },
        y: {
          grid: { color: '#F0EFED' },
          ticks: {
            font: { size: 10 },
            callback: v => v >= 1000 ? (v/1000).toFixed(0)+'k' : v
          }
        }
      }
    }
  });
}

function drawSmmEngage(w) {
  const s = w.smm;
  mkChart('chartSmmEngage', {
    type: 'doughnut',
    data: {
      labels: ['Link Clicks', 'Interactions', 'Follows', 'Profile Visits'],
      datasets: [{
        data: [
          s.link_clicks || 0,
          s.interactions || 0,
          s.follows || 0,
          s.profile_visits || 0
        ],
        backgroundColor: ['#8b5cf6','#ec4899','#22c55e','#f59e0b'],
        borderWidth: 2,
        borderColor: '#FFF',
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true,
          position: 'right',
          labels: { font: { size: 10 }, boxWidth: 10, padding: 8 }
        }
      },
      cutout: '65%',
    }
  });
}

function drawLeadSource(w) {
  const src = w.leads.by_source || {};
  const entries = Object.entries(src).filter(([,v]) => v > 0);
  const COLORS = ['#1A1A1A','#3b82f6','#22c55e','#f59e0b',
                  '#ef4444','#8b5cf6','#ec4899','#14b8a6'];

  mkChart('chartLeadSource', {
    type: 'doughnut',
    data: {
      labels: entries.map(([k]) => k.replace(/_/g,' ')),
      datasets: [{
        data: entries.map(([,v]) => v),
        backgroundColor: COLORS.slice(0, entries.length),
        borderWidth: 2,
        borderColor: '#FFF',
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true,
          position: 'right',
          labels: { font: { size: 10 }, boxWidth: 10, padding: 8 }
        }
      },
      cutout: '60%',
    }
  });
}

function drawLeadStatus(w) {
  const statuses = [
    { key: 'qualified',         label: 'Qualified',    color: '#22c55e' },
    { key: 'in_communication',  label: 'In Comm',      color: '#f59e0b' },
    { key: 'follow_up',         label: 'Follow-Up',    color: '#8b5cf6' },
    { key: 'prospect_lost',     label: 'Lost',         color: '#ef4444' },
    { key: 'junk',              label: 'Junk',         color: '#94a3b8' },
    { key: 'owner_sell',        label: 'Owner→Sell',   color: '#ec4899' },
    { key: 'future_fu',         label: 'Future FU',    color: '#3b82f6' },
  ];

  const data   = statuses.map(s => w.leads[s.key] || 0);
  const labels = statuses.map(s => s.label);
  const colors = statuses.map(s => s.color);

  mkChart('chartLeadStatus', {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors,
        borderWidth: 2,
        borderColor: '#FFF',
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true,
          position: 'right',
          labels: { font: { size: 10 }, boxWidth: 10, padding: 8 }
        }
      },
      cutout: '60%',
    }
  });
}

function drawLeadTrend() {
  mkChart('chartLeadTrend', {
    type: 'bar',
    data: {
      labels: WEEK_LABELS(),
      datasets: [
        {
          label: 'Total',
          data: weeks.map(w => w.leads.total || 0),
          backgroundColor: weeks.map((w, i) =>
            i === active ? '#1A1A1A' : '#E4E2DF'),
          borderRadius: 4,
        },
        {
          label: 'In Comm',
          data: weeks.map(w => w.leads.in_communication || 0),
          backgroundColor: weeks.map((w, i) =>
            i === active ? '#f59e0b' : 'rgba(245,158,11,0.3)'),
          borderRadius: 4,
        },
        {
          label: 'Qualified',
          data: weeks.map(w => w.leads.qualified || 0),
          backgroundColor: weeks.map((w, i) =>
            i === active ? '#22c55e' : 'rgba(34,197,94,0.3)'),
          borderRadius: 4,
        }
      ]
    },
    options: {
      ...CHART_DEFAULTS,
      plugins: {
        legend: {
          display: true,
          labels: { font: { size: 10 }, boxWidth: 10 }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 } }, stacked: false },
        y: { grid: { color: '#F0EFED' }, ticks: { font: { size: 10 } } }
      }
    }
  });
}

// ════════════════════════════════════════════
//  EXPOSE switchWeek globally
// ════════════════════════════════════════════
window.switchWeek = switchWeek;
</script>
